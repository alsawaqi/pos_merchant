services:
  pos_merchant:
    build:
      context: .
      dockerfile: docker/dev/php/php.dockerfile
    # user: "1000:1000" # your UID:GID
    volumes:
      - ./src:/var/www/html
    command: >
      sh -c "chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && php-fpm"
    depends_on:
       - pos_merchant_redis
    networks:
      - charity_net

  nginx:
    image: nginx:latest
    ports:
      - "8087:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - charity_net

  artisan:
    build:
      context: .
      dockerfile: docker/dev/artisan/artisan.dockerfile
    volumes:
      - ./src:/var/www/html
    networks:
      - charity_net
    depends_on:
      - pos_merchant
      - pos_merchant_redis

  vite:
      image: node:20-alpine
      working_dir: /var/www/html
      volumes:
         - ./src:/var/www/html
      ports:
        - "5174:5174"
      environment:
        - CHOKIDAR_USEPOLLING=true
        - CHOKIDAR_INTERVAL=200
      command: sh -c "npm install && npm run dev"
      networks:
        - charity_net    

  composer:
    image: composer:latest
    container_name: composer_pos_merchant
    volumes:
      - ./src:/app
    working_dir: /app
    command: install
    networks:
      - charity_net
      

  # Service name is intentionally unique. The shared charity_net hosts a
  # sibling project that also has a service named `redis`; with both alive,
  # Docker DNS returns BOTH IPs round-robin for the host `redis` and
  # PHP-FPM workers split sessions across the two instances — which makes
  # logins, CSRF, and everything else session-backed flicker. Keep this
  # name distinct from any other project on charity_net.
  pos_merchant_redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    # Host port intentionally 6381 — pos_admin already binds 6380:6379 on the
    # same host, and Docker Desktop refuses to start both with the same host
    # mapping. The container itself still listens on 6379; Laravel reaches it
    # via the service DNS name (`pos_merchant_redis:6379`), so this number
    # only matters for tools running on your machine (RedisInsight, redis-cli).
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    networks:
      - charity_net
networks:
  charity_net:
    external: true

volumes:
  redis-data:
