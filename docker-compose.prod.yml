# =============================================================================
# pos_merchant — PRODUCTION stack  (posmerchant.mithqal.net)
# =============================================================================
# Joins the EXISTING external `charity_net` network and shares the charity
# Postgres (host `chariyt-db`, database `charity_db`) with the charity API and
# pos_admin.
#
# IMPORTANT — pos_merchant owns NO production schema. pos_admin owns the pos_*
# tables; pos_merchant only READS/WRITES them. Its only migration file is a
# test-only fixture (env-guarded to no-op outside `testing`). There is
# therefore NO `migrate` step in this stack — do NOT run `php artisan migrate`
# against the production database from pos_merchant.
#
# pos_merchant shares pos_admin's APP_KEY (encrypted PII on the shared
# pos_users table) — see ./src/.env. Do NOT run `key:generate` here.
#
# Runtime (app + nginx + redis):
#   docker compose -f docker-compose.prod.yml up -d --build
# Deploy one-shots are profile-gated — see ./DEPLOY.md.
#
# nginx has NO host ports: it exposes :80 on charity_net under the alias
# `pos-merchant-web`. Point the host reverse proxy / TLS terminator at it:
#   posmerchant.mithqal.net  ->  pos-merchant-web:80
# =============================================================================

services:
  # ---- PHP-FPM application (long-running) ----
  pos_merchant:
    image: pos-merchant-app
    build:
      context: .
      dockerfile: docker/prod/php/php.dockerfile
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - storage-data:/var/www/html/storage
      - cache-data:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
    depends_on:
      - pos_merchant_redis
    networks:
      - charity_net

  # ---- nginx (serves /public, FastCGI -> pos_merchant:9000) ----
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - pos_merchant
    volumes:
      - ./src/public:/var/www/html/public:ro
      - storage-data:/var/www/html/storage
      - ./docker/prod/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    expose:
      - "80"
    networks:
      charity_net:
        aliases:
          - pos-merchant-web

  # ---- Redis. Unique name on charity_net (no DNS collision with charity /
  #      pos_admin redis). ----
  pos_merchant_redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - charity_net

  # ===========================================================================
  # One-shot deploy helpers — profile-gated. NOTE: there is deliberately no
  # `migrate` helper (pos_merchant owns no schema). See DEPLOY.md.
  # ===========================================================================

  # `--profile build`: PHP deps into ./src/vendor — runs in the APP image
  # (composer is baked into it) so the platform check validates against the
  # REAL runtime extensions (the official composer:2 image lacks several and
  # fails hard ext-* requires, e.g. ext-gd in the pos_admin sibling). Build
  # the image first (`docker compose -f docker-compose.prod.yml build`).
  composer:
    profiles: ["build"]
    image: pos-merchant-app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: composer install --no-dev --optimize-autoloader --no-interaction
    networks:
      - charity_net

  # `--profile build`: Vite assets into ./src/public/build
  node-build:
    profiles: ["build"]
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: sh -lc "npm ci && npm run build"
    networks:
      - charity_net

  # `--profile deploy`: rebuild Laravel caches after a code/asset deploy
  deploy:
    profiles: ["deploy"]
    image: pos-merchant-app
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ./src:/var/www/html
      - storage-data:/var/www/html/storage
      - cache-data:/var/www/html/bootstrap/cache
    entrypoint: ["sh", "-lc"]
    # The bare `rm` runs BEFORE any PHP boots: stale bootstrap caches in the
    # cache-data volume (written by the PREVIOUS release) can fatal artisan
    # itself, so `optimize:clear` alone can deadlock — it cannot clear the
    # caches that crash it. package:discover then rebuilds the package/service
    # manifests against the freshly-installed vendor/.
    command: |
      rm -f bootstrap/cache/*.php
      php artisan optimize:clear
      php artisan package:discover --ansi
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    restart: "no"
    networks:
      - charity_net

  # `--profile init`: one-time storage/cache permissions on the named volumes
  init-perms:
    profiles: ["init"]
    image: pos-merchant-app
    user: "0:0"
    volumes:
      - storage-data:/var/www/html/storage
      - cache-data:/var/www/html/bootstrap/cache
    entrypoint: ["sh", "-lc"]
    command: |
      set -e
      mkdir -p /var/www/html/storage/framework/cache \
               /var/www/html/storage/framework/sessions \
               /var/www/html/storage/framework/views \
               /var/www/html/storage/logs \
               /var/www/html/bootstrap/cache
      chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache
      chmod -R ug+rwX /var/www/html/storage /var/www/html/bootstrap/cache
    restart: "no"
    networks:
      - charity_net

networks:
  charity_net:
    external: true

volumes:
  storage-data:
  cache-data:
  redis-data:
